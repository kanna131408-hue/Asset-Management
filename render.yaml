services:
  - type: pserv
    name: snipeit-mariadb
    env: image
    image: mariadb:11.4
    disk:
      name: snipeit-db-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: snipeit
      - key: MYSQL_USER
        value: snipeit
      - key: MYSQL_PASSWORD
        generateValue: true

  - type: web
    name: snipeit-app
    env: docker
    plan: free
    disk:
      name: snipeit-storage
      mountPath: /var/lib/snipeit
      sizeGB: 1
    envVars:
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: snipeit-mariadb
          envVarKey: RENDER_DISCOVERY_NAME
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: snipeit
      - key: DB_USERNAME
        value: snipeit
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: snipeit-mariadb
          envVarKey: MYSQL_PASSWORD
      - key: APP_KEY
        generateValue: true
